on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ src/**, pom.xml ]

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - run: |
          mvn -B install

      - id: vars
        run: |
          echo "HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "VERS=$(mvn -Dexpression=project.version -B -q -DforceStdout help:evaluate)" >> "$GITHUB_OUTPUT"
          echo "AFCT=$(mvn -Dexpression=project.build.finalName -B -q -DforceStdout help:evaluate)" >> "$GITHUB_OUTPUT"

      - id: ghck
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ steps.vars.outputs.VERS }}")
          if [ "$CODE" = "200" ]; then
            echo "EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

      - id: dist
        run: |
          echo "TAG_NAME=${{ format('v{0}{1}', steps.vars.outputs.VERS, steps.ghck.outputs.EXISTS == 'true' && format('+{0}', steps.vars.outputs.HASH) || '') }}" >> "$GITHUB_OUTPUT"
          echo "REL_NAME=${{ format('{0}{1}', steps.ghck.outputs.EXISTS == 'true' && 'Snapshot ' || 'v', steps.ghck.outputs.EXISTS == 'true' && steps.vars.outputs.HASH || steps.vars.outputs.VERS) }}" >> "$GITHUB_OUTPUT"
          echo "ART_NAME=${{ format('{0}{1}.jar', steps.vars.outputs.AFCT, steps.ghck.outputs.EXISTS == 'true' && format('+{0}', steps.vars.outputs.HASH) || '') }}" >> "$GITHUB_OUTPUT"

      - run: |
          mkdir -p dist
          cp "./target/${{ steps.vars.outputs.AFCT }}.jar" ./dist/${{ steps.dist.outputs.ART_NAME }}

      - uses: actions/upload-artifact@v7
        with:
          path: dist/${{ steps.dist.outputs.ART_NAME }}
          name: ${{ steps.dist.outputs.ART_NAME }}

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.dist.outputs.TAG_NAME }}
          name: ${{ steps.dist.outputs.REL_NAME }}
          files: dist/${{ steps.dist.outputs.ART_NAME }}
          prerelease: ${{ steps.ghck.outputs.EXISTS == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}